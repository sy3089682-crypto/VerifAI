name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Generate release notes
        id: release_notes
        run: |
          echo "## VerifAI Release ${{ github.ref_name }}" > release.md
          echo "" >> release.md
          git log --oneline --no-decorate $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD >> release.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release.md
          generate_release_notes: true
          files: |
            LICENSE
